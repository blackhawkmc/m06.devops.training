version: v1.0
name: Module 6 - Terraform Essentials

agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404

global_job_config:
  secrets:
    - name: localstack
  prologue:
    commands:
      - checkout
      - export LOCALSTACK_ENDPOINT=http://devops.tomfern.com:31566
      - export AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - export AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - export AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - export AWS_EC2_METADATA_DISABLED=true
      - export AWS_PAGER=
      - export AWS_ENDPOINT_URL=$LOCALSTACK_ENDPOINT
      - export TF_VAR_AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
      - export TF_VAR_AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY

blocks:
  # ─── Exercise 1: S3 Bucket ─────────────────────────────────────────────────

  - name: "1 - Initialize"
    dependencies: []
    task:
      jobs:
        - name: Terraform Init
          commands:
            - cd 1-terraform-apply
            - terraform init
            - artifact push workflow .terraform
            - artifact push workflow .terraform.lock.hcl

  - name: "1 - Deploy S3"
    dependencies: ["1 - Initialize"]
    task:
      jobs:
        - name: Apply
          commands:
            - cd 1-terraform-apply
            - artifact pull workflow .terraform --force
            - artifact pull workflow .terraform.lock.hcl --force
            - chmod -R +x .terraform/
            - terraform validate
            - terraform apply -auto-approve
            - artifact push workflow terraform.tfstate --destination s3-terraform.tfstate

  - name: "1 - Use Bucket"
    dependencies: ["1 - Deploy S3"]
    task:
      jobs:
        - name: S3 Operations
          commands:
            - cd 1-terraform-apply
            - artifact pull workflow s3-terraform.tfstate --destination terraform.tfstate --force
            - |
              for attempt in $(seq 1 20); do
                if aws --endpoint-url="$LOCALSTACK_ENDPOINT" s3 ls > /dev/null 2>&1; then
                  break
                fi
                if [[ "$attempt" -eq 20 ]]; then
                  echo "S3 endpoint/API unreachable at: $LOCALSTACK_ENDPOINT"
                  exit 1
                fi
                sleep 2
              done
            - aws --endpoint-url="$LOCALSTACK_ENDPOINT" s3 cp README.md s3://fbaba-test-bucket/
            - aws --endpoint-url="$LOCALSTACK_ENDPOINT" s3 ls s3://fbaba-test-bucket
            - aws --endpoint-url="$LOCALSTACK_ENDPOINT" s3 rm s3://fbaba-test-bucket/README.md

  - name: "1 - Destroy S3"
    dependencies: ["1 - Use Bucket"]
    task:
      jobs:
        - name: Destroy
          commands:
            - cd 1-terraform-apply
            - artifact pull workflow .terraform --force
            - artifact pull workflow .terraform.lock.hcl --force
            - chmod -R +x .terraform/
            - artifact pull workflow s3-terraform.tfstate --destination terraform.tfstate --force
            - terraform destroy -auto-approve

  # ─── Exercise 2: EC2 Instance ──────────────────────────────────────────────

  - name: "2 - Deploy EC2"
    dependencies: ["1 - Initialize"]
    task:
      jobs:
        - name: Apply
          commands:
            - cd 2-terraform-ec2
            - artifact pull workflow .terraform --force
            - artifact pull workflow .terraform.lock.hcl --force
            - chmod -R +x .terraform/
            - terraform validate
            - terraform apply -auto-approve
            - artifact push workflow terraform.tfstate --destination ec2-terraform.tfstate

  - name: "2 - Destroy EC2"
    dependencies: ["2 - Deploy EC2"]
    task:
      jobs:
        - name: Destroy
          commands:
            - cd 2-terraform-ec2
            - artifact pull workflow .terraform --force
            - artifact pull workflow .terraform.lock.hcl --force
            - chmod -R +x .terraform/
            - artifact pull workflow ec2-terraform.tfstate --destination terraform.tfstate --force
            - terraform destroy -auto-approve

  # ─── Exercise 3: DynamoDB Table ────────────────────────────────────────────

  - name: "3 - Deploy DynamoDB"
    dependencies: ["1 - Initialize"]
    task:
      jobs:
        - name: Apply
          commands:
            - cd 3-terraform-dynamodb
            - artifact pull workflow .terraform --force
            - artifact pull workflow .terraform.lock.hcl --force
            - chmod -R +x .terraform/
            - |
              for attempt in $(seq 1 20); do
                if aws --endpoint-url="$LOCALSTACK_ENDPOINT" dynamodb list-tables > /dev/null 2>&1; then
                  break
                fi
                if [[ "$attempt" -eq 20 ]]; then
                  echo "DynamoDB endpoint/API unreachable at: $LOCALSTACK_ENDPOINT"
                  exit 1
                fi
                sleep 2
              done
            - |
              # If the table exists already, import it into state instead of trying to recreate it.
              if aws --endpoint-url="$LOCALSTACK_ENDPOINT" dynamodb describe-table --table-name fbaba-devops-training-table > /dev/null 2>&1; then
                if ! terraform state show aws_dynamodb_table.example > /dev/null 2>&1; then
                  echo "Found existing table fbaba-devops-training-table, importing into Terraform state"
                  terraform import aws_dynamodb_table.example fbaba-devops-training-table
                fi
              fi
            - terraform validate
            - terraform apply -auto-approve
            - artifact push workflow terraform.tfstate --destination ddb-terraform.tfstate

  - name: "3 - Interact DynamoDB"
    dependencies: ["3 - Deploy DynamoDB"]
    task:
      jobs:
        - name: DynamoDB Operations
          commands:
            - cd 3-terraform-dynamodb
            - artifact pull workflow ddb-terraform.tfstate --destination terraform.tfstate --force
            - |
              for attempt in $(seq 1 20); do
                if aws --endpoint-url="$LOCALSTACK_ENDPOINT" dynamodb list-tables > /dev/null 2>&1; then
                  break
                fi
                if [[ "$attempt" -eq 20 ]]; then
                  echo "DynamoDB endpoint/API unreachable at: $LOCALSTACK_ENDPOINT"
                  exit 1
                fi
                sleep 2
              done
            - aws --endpoint-url="$LOCALSTACK_ENDPOINT" dynamodb list-tables
            - aws --endpoint-url="$LOCALSTACK_ENDPOINT" dynamodb describe-table --table-name fbaba-devops-training-table
            - |
              aws --endpoint-url="$LOCALSTACK_ENDPOINT" dynamodb put-item \
                --table-name fbaba-devops-training-table \
                --item '{"user_id": {"S": "u1"}, "name": {"S": "Alice"}, "email": {"S": "alice@example.com"}}'
            - aws --endpoint-url="$LOCALSTACK_ENDPOINT" dynamodb scan --table-name fbaba-devops-training-table

  - name: "3 - Destroy DynamoDB"
    dependencies: ["3 - Interact DynamoDB"]
    task:
      jobs:
        - name: Destroy
          commands:
            - cd 3-terraform-dynamodb
            - artifact pull workflow .terraform --force
            - artifact pull workflow .terraform.lock.hcl --force
            - chmod -R +x .terraform/
            - artifact pull workflow ddb-terraform.tfstate --destination terraform.tfstate --force
            - terraform destroy -auto-approve
